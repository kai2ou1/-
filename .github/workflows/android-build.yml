name: Android CI Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  GRADLE_VERSION: "8.5"

jobs:
  # ─── 单元测试 ───
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - run: ./gradlew testDebugUnitTest

  # ─── Debug 构建 ───
  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingBilling-debug-universal
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ─── Release 构建 + 发布 ───
  # 当推送 tag（如 v1.0.0）时触发：构建 arm64-v8a + armeabi-v7a 并发布到 Releases
  release:
    name: Release ${{ matrix.arch.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        arch:
          - name: arm64-v8a
            abi_flag: -Pandroid.injected.build.abi=arm64-v8a
          - name: armeabi-v7a
            abi_flag: -Pandroid.injected.build.abi=armeabi-v7a

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}

      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Release APK - ${{ matrix.arch.name }}
        run: ./gradlew assembleRelease ${{ matrix.arch.abi_flag }}

      - name: Rename APK
        run: |
          mkdir -p release-out
          APK_FILE=$(find app/build -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "release-out/ParkingBilling-${{ matrix.arch.name }}-release.apk"
          else
            echo "ERROR: No APK found!"
            find app/build -type d -maxdepth 6
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingBilling-Release-${{ matrix.arch.name }}
          path: release-out/*.apk
          retention-days: 90

  # ─── 汇总发布 ───
  publish-release:
    name: Publish to Releases
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download All Release APKs
        uses: actions/download-artifact@v4
        with:
          pattern: ParkingBilling-Release-*
          merge-multiple: true
          path: release-apks

      - name: Verify APKs
        run: |
          ls -la release-apks/
          echo "APK count: $(ls release-apks/*.apk 2>/dev/null | wc -l)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "停车计费系统 ${{ github.ref_name }}"
          files: release-apks/*.apk
          body: |
            ## 停车计费系统 ${{ github.ref_name }}

            ### APK 下载
            - **ParkingBilling-arm64-v8a-release.apk** — ARM 64位（推荐，现代安卓手机）
            - **ParkingBilling-armeabi-v7a-release.apk** — ARM 32位（旧款设备）

            ### 计费规则
            - 1小时内免费
            - 4小时内收费5元
            - 超过4小时后，每增加1小时加收2元（不足1小时按1小时算）
            - 24小时内封顶20元
          makeLatest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
