# =============================================================
# 停车计费系统 - GitHub Actions CI/CD
# 自动构建 APK，支持多版本系统编译 + 多架构分拆
# =============================================================

name: Android CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # 支持手动触发

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"

jobs:
  # ─── Job 1: 代码质量检查 ───
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Lint
        run: ./gradlew lint
        continue-on-error: true

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint*/*
          retention-days: 14

  # ─── Job 2: 单元测试 ───
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests/*
          retention-days: 14

  # ─── Job 3: 多系统版本 + 多架构 编译 ───
  build:
    name: Build (API ${{ matrix.api_level }} / ${{ matrix.abi }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    strategy:
      fail-fast: false              # 一个失败不阻塞其他
      matrix:
        # 按 Android API 级别 + CPU 架构 矩阵拆分
        api_level: [26, 30, 34]
        abi: [universal, arm64-v8a, armeabi-v7a, x86_64]
        include:
          # API 26 → Android 8.0 (最低支持)
          - api_level: 26
            display_name: "Android 8.0 Oreo"
          # API 30 → Android 11
          - api_level: 30
            display_name: "Android 11"
          # API 34 → Android 14 (最新稳定版)
          - api_level: 34
            display_name: "Android 14"
        exclude:
          # universal 和 abi 互斥：universal 时无需再拆
          - abi: universal
          # 只对 API 34 做 ABI 拆分（实际发布时用）
          # 另外两个 api_level 只跑 universal 包做验证
          - api_level: 26
            abi: arm64-v8a
          - api_level: 26
            abi: armeabi-v7a
          - api_level: 26
            abi: x86_64
          - api_level: 30
            abi: arm64-v8a
          - api_level: 30
            abi: armeabi-v7a
          - api_level: 30
            abi: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ matrix.api_level }}
          build-tools-version: '34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 根据矩阵生成不同 build.gradle.kts 配置
      - name: Configure Build for API ${{ matrix.api_level }}
        run: |
          # 备份原始配置
          cp app/build.gradle.kts app/build.gradle.kts.bak
          # 动态替换 compileSdk / targetSdk
          sed -i "s/compileSdk = [0-9]\+/compileSdk = ${{ matrix.api_level }}/" app/build.gradle.kts
          sed -i "s/targetSdk = [0-9]\+/targetSdk = ${{ matrix.api_level }}/" app/build.gradle.kts
          echo "Configured for API level ${{ matrix.api_level }}"

      - name: Build APK (${{ matrix.abi }})
        run: |
          if [ "${{ matrix.abi }}" = "universal" ]; then
            ./gradlew assembleDebug
          else
            # 只有 API34 的 build 做 ABI 拆分
            ./gradlew assembleDebug -Pandroid.injected.build.abi=${{ matrix.abi }}
          fi

      # 恢复原始配置
      - name: Restore Build Config
        if: always()
        run: |
          mv app/build.gradle.kts.bak app/build.gradle.kts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingBilling-API${{ matrix.api_level }}-${{ matrix.abi }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

  # ─── Job 4: 生成 Release APK（签名版） ───
  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test, build]
    # 只在 push 到 main/master 时触发
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      fail-fast: false
      matrix:
        abi: [universal, arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: |
          if [ "${{ matrix.abi }}" = "universal" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleRelease -Pandroid.injected.build.abi=${{ matrix.abi }}
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingBilling-Release-${{ matrix.abi }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Generate Release Info
        run: |
          echo "## Build Summary" > release-info.md
          echo "- Commit: ${{ github.sha }}" >> release-info.md
          echo "- Build Date: $(date -u +'%Y-%m-%d %H:%M UTC')" >> release-info.md
          echo "- ABI: ${{ matrix.abi }}" >> release-info.md
          echo "- Java: $(java -version 2>&1 | head -1)" >> release-info.md

      - name: Upload Release Info
        uses: actions/upload-artifact@v4
        with:
          name: release-info-${{ matrix.abi }}
          path: release-info.md
          retention-days: 90

  # ─── Job 5: 结果汇总 ───
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build, release-build]
    if: always()
    steps:
      - name: Summarize Results
        run: |
          echo "## ✅ 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 调试版 APKs" >> $GITHUB_STEP_SUMMARY
          echo "- API 26 (Android 8.0 Oreo) — universal" >> $GITHUB_STEP_SUMMARY
          echo "- API 30 (Android 11) — universal" >> $GITHUB_STEP_SUMMARY
          echo "- API 34 (Android 14) — universal + arm64-v8a + armeabi-v7a + x86_64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 发布版 APKs" >> $GITHUB_STEP_SUMMARY
          echo "- universal, arm64-v8a, armeabi-v7a, x86_64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "所有构建产物请在 Artifacts 中下载" >> $GITHUB_STEP_SUMMARY
